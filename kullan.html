
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ödeme</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="center">

<div id="loading">
<div class="spinner"></div>
<p id="text">Başlatılıyor...</p>
</div>

<div id="success" style="display:none;">
<div class="success">✔</div>
<h2 id="result"></h2>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc,getDoc,updateDoc,addDoc,collection,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

if(!localStorage.getItem("userId")){
const p=new URLSearchParams(window.location.search);
window.location="login.html?redirect=kullan&islem="+p.get("islem");
}

const params=new URLSearchParams(window.location.search);
const islem=Number(params.get("islem"));

const messages=["Bağlanıyor...","Bakiye kontrol...","İşlem yapılıyor..."];
let i=0;
const text=document.getElementById("text");

function change(){
if(i<messages.length){
text.textContent=messages[i];
i++;
setTimeout(change,1000);
}
}
change();

setTimeout(async()=>{
const ref=doc(db,"users",localStorage.getItem("userId"));
const snap=await getDoc(ref);

if(snap.exists()){
const data=snap.data();

if(data.balance>=islem){
const newBalance=data.balance-islem;
await updateDoc(ref,{balance:newBalance});

await addDoc(collection(db,"transactions"),{
name:data.name,
surname:data.surname,
amount:-islem,
date:serverTimestamp()
});

document.getElementById("loading").style.display="none";
document.getElementById("success").style.display="block";
document.getElementById("result").textContent=islem+" TL çekildi";
}else{
text.textContent="Yetersiz bakiye";
}
}
},3000);
</script>

</body>
</html>
