
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ödeme</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loadingScreen" class="centerBox">
<div class="spinner"></div>
<p id="loadingText">Başlatılıyor...</p>
</div>

<div id="successScreen" class="centerBox" style="display:none;">
<div class="successCircle"><div class="checkmark">✔</div></div>
<h2 id="resultText"></h2>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

if(!localStorage.getItem("userId")){
  const params = new URLSearchParams(window.location.search);
  const islem = params.get("islem");
  window.location = "login.html?redirect=kullan&islem=" + islem;
}

const params = new URLSearchParams(window.location.search);
const islem = Number(params.get("islem"));

if(!islem || islem <= 0){
  document.getElementById("loadingText").textContent = "Geçersiz işlem";
}

const messages = [
"Bağlantı kuruluyor...",
"Bakiye kontrol ediliyor...",
"İşlem gerçekleştiriliyor..."
];

let step = 0;
const loadingText = document.getElementById("loadingText");

function changeText(){
  if(step < messages.length){
    loadingText.textContent = messages[step];
    step++;
    setTimeout(changeText,1000);
  }
}

changeText();

setTimeout(async ()=>{

  const userId = localStorage.getItem("userId");
  const ref = doc(db,"users",userId);
  const snap = await getDoc(ref);

  if(snap.exists()){
    const data = snap.data();

    if(data.balance >= islem){
      const newBalance = data.balance - islem;
      await updateDoc(ref,{ balance:newBalance });

      document.getElementById("loadingScreen").style.display="none";
      document.getElementById("successScreen").style.display="flex";
      document.getElementById("resultText").textContent = islem + " TL çekildi. Yeni bakiye: " + newBalance + " TL";
    } else {
      document.getElementById("loadingText").textContent = "Yetersiz bakiye";
    }
  }

},3000);

</script>
</body>
</html>
