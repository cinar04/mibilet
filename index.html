
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topRight">
<button id="panelBtn" style="display:none;">PANEL</button>
</div>

<div id="cardBox" class="center"></div>

<script type="module">
import { db } from "./firebase.js";
import { doc,getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

if(!localStorage.getItem("userId")){
window.location="login.html";
}

const ref=doc(db,"users",localStorage.getItem("userId"));
const snap=await getDoc(ref);

if(snap.exists()){
const data=snap.data();

if(data.role==="admin"){
document.getElementById("panelBtn").style.display="block";
document.getElementById("panelBtn").onclick=()=>window.location="panel.html";
}

document.getElementById("cardBox").innerHTML=`
<div class="card">
<img src="${data.cardImage}" width="300">
<h2>${data.name} ${data.surname}</h2>
<p>${data.cardNumber}</p>
<p>Bakiye: ${data.balance} TL</p>
</div>`;
}
</script>

</body>
</html>
