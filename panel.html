
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panelBox">
<h2>Admin Panel</h2>

<h3>İşlem Geçmişi</h3>
<div id="list"></div>

<h3>Para Yatır</h3>
<input id="email" placeholder="E-posta">
<input id="amount" placeholder="Tutar">
<button id="deposit">Yatır</button>

<h3>Kullanıcı Ekle</h3>
<input id="name" placeholder="Ad">
<input id="surname" placeholder="Soyad">
<input id="newEmail" placeholder="E-posta">
<input id="pass1" type="password" placeholder="Şifre">
<input id="pass2" type="password" placeholder="Şifre tekrar">
<button id="createUser">Oluştur</button>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection,getDocs,addDoc,query,where,updateDoc,doc,getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

if(!localStorage.getItem("userId")){
window.location="login.html";
}

const userRef=doc(db,"users",localStorage.getItem("userId"));
const userSnap=await getDoc(userRef);

if(!userSnap.exists() || userSnap.data().role!=="admin"){
window.location="index.html";
}

const trans=await getDocs(collection(db,"transactions"));
trans.forEach(d=>{
document.getElementById("list").innerHTML+=
"<div class='listItem'>"+d.data().name+" "+d.data().surname+" "+d.data().amount+" TL</div>";
});

document.getElementById("deposit").onclick=async()=>{
const email=document.getElementById("email").value;
const amount=Number(document.getElementById("amount").value);

const q=query(collection(db,"users"),where("email","==",email));
const snap=await getDocs(q);

if(!snap.empty){
const userDoc=snap.docs[0];
const newBalance=userDoc.data().balance+amount;
await updateDoc(doc(db,"users",userDoc.id),{balance:newBalance});
alert("Para yatırıldı");
}
};

document.getElementById("createUser").onclick=async()=>{
const name=document.getElementById("name").value;
const surname=document.getElementById("surname").value;
const email=document.getElementById("newEmail").value;
const p1=document.getElementById("pass1").value;
const p2=document.getElementById("pass2").value;

if(p1!==p2){alert("Şifreler aynı değil");return;}

await addDoc(collection(db,"users"),{
name:name,
surname:surname,
email:email,
password:p1,
role:"user",
balance:0,
cardNumber:"0000 0000 0000 0000",
cardImage:email+".png"
});

alert("Kullanıcı oluşturuldu");
};
</script>

</body>
</html>
